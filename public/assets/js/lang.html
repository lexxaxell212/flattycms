<div class="lang-toggle" id="langToggle">
  <button class="lang-btn active" data-lang="id">
    <span class="lang-flag">🇮🇩</span>
    <span class="lang-text">ID</span>
  </button>
  <div class="lang-divider"></div>
  <button class="lang-btn" data-lang="en">
    <span class="lang-flag">🇬🇧</span>
    <span class="lang-text">EN</span>
  </button>
</div>

<h1 data-bhs="home">Beranda</h1>

<style>
  .lang-toggle {
    display: inline-flex;
    align-items: center;
    background: var(--glass-bg, rgba(255,255,255,.1));
    border: 1px solid rgba(124,58,237,.2);
    border-radius: 100px;
    padding: .2rem;
    gap: .1rem;
  }
  .lang-btn {
    display: inline-flex;
    align-items: center;
    gap: .3rem;
    padding: .3rem .65rem;
    border-radius: 100px;
    border: none;
    background: transparent;
    font-size: .75rem;
    font-weight: 600;
    color: #6b7280;
    cursor: pointer;
    transition: all .2s;
  }
  .lang-btn.active {
    background: #7c3aed;
    color: #fff;
    box-shadow: 0 2px 8px rgba(124,58,237,.3);
  }
  .lang-btn:not(.active):hover {
    color: #7c3aed;
  }
  .lang-flag {
    font-size: .85rem;
  }
  .lang-divider {
    width: 1px;
    height: 14px;
    background: rgba(124,58,237,.2);
  }

  [data-dark] .lang-toggle {
    border-color: rgba(167,139,250,.2);
  }
  [data-dark] .lang-btn:not(.active) {
    color: #9ca3af;
  }
</style>

<script>
  (function() {
    const translations = {
      id: {
        'home': 'Beranda',
        'newsletter.input': 'nama@email.com',
      },
      en: {
        'home': 'Home',
        'newsletter.input': 'name@email.com',
      }
    };

    const savedLang = localStorage.getItem('lang') || 'id';
    function applyLang(lang) {
      const t = translations[lang];
      document.querySelectorAll('[data-bhs]').forEach(el => {
        const key = el.dataset.bhs;
        if (!t[key]) return;
        if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
          el.placeholder = t[key];
        } else {
          el.textContent = t[key];
        }
      });
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      localStorage.setItem('lang',
        lang);
      document.documentElement.lang = lang;
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => applyLang(btn.dataset.lang));
    });

    applyLang(savedLang);
  })();
</script>
